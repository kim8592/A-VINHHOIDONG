<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game 2 Đội Đối Kháng</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f4f7;
}
header{
  background:#263238;
  color:white;
  padding:14px;
  text-align:center;
  font-size:28px;
}
#topBar{
  display:flex;
  justify-content:space-between;
  padding:10px 40px;
}
.score{
  font-size:22px;
  font-weight:bold;
}
#controls{
  text-align:center;
  margin:10px;
}
button{
  padding:10px 20px;
  font-size:18px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
#editor{
  display:none;
  background:white;
  margin:10px 40px;
  padding:15px;
  border-radius:10px;
}
input,select{
  padding:8px;
  width:98%;
  margin:5px 0;
  font-size:16px;
}
#questionBox{
  margin:10px 40px;
  padding:20px;
  background:white;
  border-radius:12px;
  font-size:26px;
  text-align:center;
}
.container{
  display:flex;
  gap:30px;
  padding:20px 40px;
  align-items:center;
}
.team{
  flex:1;
  background:white;
  border-radius:12px;
  padding:15px;
}
.teamTitle{
  text-align:center;
  font-size:22px;
  color:white;
  padding:10px;
  border-radius:8px;
}
.mouse{background:#1976d2;}
.key{background:#ef6c00;}

.answersBox{
  flex:0.8;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.answer{
  margin:10px 0;
  padding:16px;
  font-size:24px;
  background:#e0e0e0;
  border-radius:10px;
  cursor:pointer;
  text-align:center;
}

.correct{background:#4caf50;color:white;}
.wrong{background:#e53935;color:white;}
</style>
</head>

<body>

<header>🎮 TRƯỜNG TIỂU HỌC KHÁNH BÌNH (GAME ĐỐI KHÁNG)</header>

<div id="topBar">
  <div class="score">🖱️ TEAM - CHUỘT: <span id="scoreMouse">0</span></div>
  <div class="score">⌨️ TEAM - BÀN PHÍM: <span id="scoreKey">0</span></div>
</div>

<div id="controls">
  <button onclick="toggleEditor()">⚙️ Tạo câu hỏi</button>
  <button onclick="startGame()">▶️ Bắt đầu chơi</button>
  <button onclick="clearQuestions()">🗑️ Xóa toàn bộ câu hỏi</button>
</div>

<div id="editor">
  <input id="q" placeholder="Câu hỏi">
  <input id="a" placeholder="Đáp án A">
  <input id="b" placeholder="Đáp án B">
  <input id="c" placeholder="Đáp án C">
  <input id="d" placeholder="Đáp án D">
  Đáp án đúng:
  <select id="correct">
    <option>A</option><option>B</option>
    <option>C</option><option>D</option>
  </select>
  <br><br>
  <button onclick="addQuestion()">➕ Thêm câu</button>
</div>

<div id="questionBox">Nhấn “Bắt đầu chơi”</div>

<div class="container">

  <div class="team">
    <div class="teamTitle mouse">🖱️ TEAM - CHUỘT</div>
    <p style="text-align:center;font-size:18px">Dùng chuột chọn</p>
  </div>

  <div class="answersBox">
    <div class="answer" onclick="choose('A','mouse')">A</div>
    <div class="answer" onclick="choose('B','mouse')">B</div>
    <div class="answer" onclick="choose('C','mouse')">C</div>
    <div class="answer" onclick="choose('D','mouse')">D</div>
  </div>

  <div class="team">
    <div class="teamTitle key">⌨️ TEAM - BÀN PHÍM</div>
    <p style="text-align:center;font-size:18px">Gõ A B C D</p>
  </div>

</div>

<audio id="rightSound">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>
<audio id="wrongSound">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>
let questions = JSON.parse(localStorage.getItem("questions2doi")) || [];
let current=0;
let scoreMouse=0;
let scoreKey=0;
let locked=false;

function saveToStorage(){
  localStorage.setItem("questions2doi", JSON.stringify(questions));
}

function toggleEditor(){
  editor.style.display = editor.style.display==="none"?"block":"none";
}

function addQuestion(){
  questions.push({
    q:q.value,a:a.value,b:b.value,c:c.value,d:d.value,
    correct:correct.value
  });
  saveToStorage();
  q.value=a.value=b.value=c.value=d.value="";
}

function clearQuestions(){
  if(confirm("Xóa toàn bộ câu hỏi?")){
    questions=[];
    saveToStorage();
    alert("Đã xóa");
  }
}

function startGame(){
  if(questions.length===0){
    alert("Chưa có câu hỏi");
    return;
  }
  current=0;
  scoreMouse=0;
  scoreKey=0;
  updateScore();
  loadQuestion();
}

function loadQuestion(){
  locked=false;
  const qn=questions[current];
  questionBox.innerText = "Câu " + (current+1) + ": " + qn.q;
  const ans=document.querySelectorAll(".answer");
  ans[0].innerText="A. "+qn.a;
  ans[1].innerText="B. "+qn.b;
  ans[2].innerText="C. "+qn.c;
  ans[3].innerText="D. "+qn.d;
  ans.forEach(b=>b.className="answer");
}

function choose(letter,team){
  if(locked) return;
  locked=true;

  const qn=questions[current];
  const btn=[...document.querySelectorAll(".answer")]
    .find(b=>b.innerText.startsWith(letter));

  if(letter===qn.correct){
    btn.classList.add("correct");
    rightSound.play();
    if(team==="mouse") scoreMouse++;
    else scoreKey++;
  }else{
    btn.classList.add("wrong");
    wrongSound.play();
  }

  updateScore();

  setTimeout(()=>{
    current++;
    if(current>=questions.length){
      endGame();
    }else{
      loadQuestion();
    }
  },1000);
}

function updateScore(){
  scoreMouseSpan.innerText = scoreMouse;
  scoreKeySpan.innerText = scoreKey;
}

function endGame(){
  if(scoreMouse>scoreKey){
    questionBox.innerText="🎉 TEAM - CHUỘT CHIẾN THẮNG!";
  }else if(scoreKey>scoreMouse){
    questionBox.innerText="🎉 TEAM - BÀN PHÍM CHIẾN THẮNG!";
  }else{
    questionBox.innerText="🤝 HAI ĐỘI HÒA NHAU!";
  }
}

const scoreMouseSpan=document.getElementById("scoreMouse");
const scoreKeySpan=document.getElementById("scoreKey");

document.addEventListener("keydown",e=>{
  const k=e.key.toUpperCase();
  if(["A","B","C","D"].includes(k)) choose(k,"key");
});
</script>

</body>
</html>
